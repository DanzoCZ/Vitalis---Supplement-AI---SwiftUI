      - name: Build Swift Package
        run: |
          swift build -c release --triple arm64-apple-ios17.0-simulator
          
      - name: Create Fake IPA for Testing
        run: |
          mkdir -p Payload
          # Najde zkompilovanou binárku a zkopíruje ji
          find .build -name "Vitalis" -type f -exec cp {} Payload/VitalisApp \;
          zip -r Vitalis.ipa Payload
