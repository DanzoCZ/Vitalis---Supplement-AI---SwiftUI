name: Build iOS IPA
on: [push] # Spustí se pokaždé, když nahrajete kód

jobs:
  build:
    runs-on: macos-latest # Tady se děje to kouzlo - GitHub zapne Mac
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build App
        run: |
          # Nahraďte 'VaseAplikace' názvem vašeho projektu
          xcodebuild archive -scheme VaseAplikace -archivePath build/VaseAplikace.xcarchive -sdk iphoneos

      - name: Export IPA (Unsigned)
        run: |
          # Vytvoří složku Payload pro "falešné" IPA (pro simulátory/testování)
          mkdir Payload
          cp -r build/VaseAplikace.xcarchive/Products/Applications/*.app Payload/
          zip -r VaseAplikace.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-app-ipa
          path: VaseAplikace.ipa
