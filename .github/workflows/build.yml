      - name: Build Swift Package for iOS simulator
        run: |
          # Ensure we use the iOS Simulator SDK from Xcode
          SDKROOT=$(xcrun --sdk iphonesimulator --show-sdk-path)
          echo "Using SDKROOT=$SDKROOT"
          export SDKROOT

          # Optional: select a specific Xcode if required on the runner
          # Adjust path if you need a different Xcode version (or remove if unnecessary)
          if [ -d "/Applications/Xcode_15.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer || true
          fi

          # Build the Swift package for the simulator triple
          swift build -c release --triple arm64-apple-ios17.0-simulator

      - name: Create Fake IPA for Testing (simulator)
        run: |
          # Locate the simulator release binary produced by `swift build`
          BUILD_ROOT=$(find .build -type d -name "arm64-apple-ios17.0-simulator" -print -quit)/release
          BINARY="$BUILD_ROOT/Vitalis"
          if [ ! -f "$BINARY" ]; then
            echo "Binary not found at $BINARY"
            ls -R .build
            exit 1
          fi

          # Create minimal .app bundle and package as an .ipa (for CI/test artifacts only)
          rm -rf Payload
          mkdir -p Payload/Vitalis.app
          cat > Payload/Vitalis.app/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>Vitalis</string>
            <key>CFBundleIdentifier</key><string>com.example.Vitalis</string>
            <key>CFBundleName</key><string>Vitalis</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
          </dict></plist>
          EOF

          cp "$BINARY" Payload/Vitalis.app/Vitalis
          chmod +x Payload/Vitalis.app/Vitalis
          zip -r Vitalis.ipa Payload

